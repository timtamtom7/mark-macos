name: Mark
options:
  bundleIdPrefix: com.mark
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Mark
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  Mark:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Mark.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mark.macos
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: Sources/Mark.entitlements
    dependencies:
      - target: MarkWidget
        embed: true

  MarkWidget:
    type: app-extension
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: MarkWidget
        type: group
    settings:
      base:
        INFOPLIST_FILE: MarkWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mark.macos.widget
        PRODUCT_NAME: MarkWidget
        PRODUCT_MODULE_NAME: MarkWidget
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
